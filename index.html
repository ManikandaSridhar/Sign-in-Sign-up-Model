<!DOCTYPE html>
<html>
<head>
  <title>Aurora UI</title>
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <div class="logo">A</div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account</p>

    <div class="social">
      <button><i class="fab fa-google"></i> Google</button>
      <button><i class="fab fa-github"></i> GitHub</button>
    </div>

    <p class="or">or continue with email</p>

    <div class="inputBox">
      <i class="fa fa-envelope"></i>
      <input type="email" id="loginEmail" placeholder="Email">
    </div>

    <div class="inputBox">
      <i class="fa fa-lock"></i>
      <input type="password" id="loginPassword" placeholder="Password">
    </div>

    <p class="forgot">Forgot password?</p>

    <button class="mainBtn" onclick="loginUser()">Sign In →</button>
  </div>

  <!-- SIGNUP -->
  <div class="card">
    <div class="logo">A</div>
    <h2>Create account</h2>
    <p class="sub">Join now</p>

    <div class="row">
      <input type="text" id="name" placeholder="First Name">
      <input type="text" placeholder="Last Name">
    </div>

    <div class="inputBox">
      <i class="fa fa-envelope"></i>
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="inputBox">
      <i class="fa fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <div class="strength"></div>

    <label class="terms">
      <input type="checkbox"> I agree to terms
    </label>

    <button class="mainBtn" onclick="registerUser()">Create Account →</button>

    <p class="signinLink">Already have account? Sign in</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
